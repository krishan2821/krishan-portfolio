# Spring Boot application configuration for the portfolio backend
spring.application.name=portfolio-backend
server.port=8080

# MongoDB connection — override MONGODB_URI in production via environment variable
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=portfolio_db

# Logging
logging.level.com.portfolio=DEBUG
logging.level.org.springframework.data.mongodb=INFO
